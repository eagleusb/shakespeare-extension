<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shakespeare prose.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    /* ─── Loading spinner ──────────────────────────────────────────── */

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 14px;
      color: #8888aa;
    }

    /* ─── Error display ────────────────────────────────────────────── */

    #error {
      display: none;
      background: #3a1a1a;
      border: 1px solid #6b2a2a;
      border-radius: 8px;
      padding: 16px;
      color: #ff8888;
      font-size: 14px;
      line-height: 1.5;
    }

    #error h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ff6666;
    }

    /* ─── Result display ───────────────────────────────────────────── */

    #result {
      display: none;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: inline;
    }

    .retry-icon {
      display: none;
      margin-left: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #6c63ff;
      vertical-align: middle;
      transition: color 0.15s, transform 0.15s;
    }

    .retry-icon:hover {
      color: #aaffaa;
      transform: rotate(90deg);
    }

    .retry-icon.show {
      display: inline;
    }

    .latency {
      display: none;
      margin-left: 6px;
      font-size: 10px;
      color: #666;
      font-family: monospace;
      vertical-align: middle;
    }

    .latency.show {
      display: inline;
    }

    .section-error {
      color: #ff8888;
      font-size: 13px;
      font-style: italic;
    }

    .section-content {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .section-content.original {
      color: #aaaacc;
      text-decoration: line-through;
      text-decoration-color: #665566;
    }

    .section-content.corrected {
      color: #aaffaa;
      border-color: #2a4a2a;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .section-content.corrected.copied {
      border-color: #4caf50;
      background: #1a2e1a;
    }

    .section-content.suggested {
      color: #aaddff;
      border-color: #2a3a5a;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .section-content.suggested.copied {
      border-color: #4caf50;
      background: #1a2e2a;
    }

    /* ─── Streaming indicator (bouncing dots) ──────────────────────── */

    .streaming-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .streaming-indicator.hidden {
      display: none;
    }

    .streaming-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6c63ff;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .streaming-indicator span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .streaming-indicator span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── Settings bar ─────────────────────────────────────────────── */

    .settings-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .settings-bar label {
      font-size: 11px;
      font-weight: 600;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .settings-bar input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 4px 8px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .settings-bar input:focus {
      border-color: #6c63ff;
    }

    .checkmark {
      opacity: 0;
      visibility: hidden;
      color: #4caf50;
      font-size: 16px;
      font-weight: 700;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .checkmark.show {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>
  <div class="settings-bar">
    <label for="api-url">API</label>
    <input type="text" id="api-url" placeholder="http://localhost:8080" spellcheck="false">
    <span id="api-saved" class="checkmark">&#10003;</span>
  </div>
  <div id="loading">
    <div class="spinner"></div>
    <p>Correcting text...</p>
  </div>

  <div id="error">
    <h2>Error</h2>
    <p id="error-message"></p>
  </div>

  <div id="result">
    <div class="section">
      <div class="section-label">Original</div>
      <div class="section-content original" id="original-text"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-label">Corrected</span>
        <span class="retry-icon" id="retry-corrected">&#8635;</span>
        <span class="latency" id="latency-corrected"></span>
      </div>
      <div class="section-content corrected" id="corrected-text">
        <div id="corrected-indicator" class="streaming-indicator hidden">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-label">Suggested</span>
        <span class="retry-icon" id="retry-suggested">&#8635;</span>
        <span class="latency" id="latency-suggested"></span>
      </div>
      <div class="section-content suggested" id="suggested-text">
        <div id="suggested-indicator" class="streaming-indicator hidden">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <script src="result.js"></script>
</body>
</html>
